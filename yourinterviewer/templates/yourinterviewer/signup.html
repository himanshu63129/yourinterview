<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | yourInterviewer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0b0f19; font-family: 'Inter', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        input { background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(255, 255, 255, 0.1); color: white; transition: all 0.2s; }
        input:focus { border-color: #7c3aed; outline: none; box-shadow: 0 0 0 2px rgba(124, 58, 237, 0.2); }
        .bg-gradient { background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%); transition: transform 0.2s, box-shadow 0.2s; }
        .bg-gradient:hover { transform: translateY(-1px); box-shadow: 0 8px 15px -5px rgba(124, 58, 237, 0.4); }
    </style>
</head>
<body>
    <div class="glass-card w-full max-w-md p-8 rounded-2xl mx-4">
        <div class="text-center mb-8">
            <h2 class="text-3xl font-bold text-white mb-2">Create Account</h2>
            <p class="text-gray-400">Start your interview journey today.</p>
        </div>

        {% if messages %}
        <div class="mb-4">
            {% for message in messages %}
            <div class="bg-red-500/20 border border-red-500/50 text-red-200 px-4 py-2 rounded">
                {{ message }}
            </div>
            {% endfor %}
        </div>
        {% endif %}

        <form method="POST" action="{% url 'signup' %}" class="space-y-5">
            {% csrf_token %}
            <div>
                <label class="block text-sm font-medium text-gray-300 mb-2">Full Name</label>
                <input type="text" name="name" required class="w-full px-4 py-3 rounded-lg" placeholder="John Doe">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-300 mb-2">Email Address</label>
                <input type="email" name="email" required class="w-full px-4 py-3 rounded-lg" placeholder="you@example.com">
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-300 mb-2">Password</label>
                <input type="password" name="password" required class="w-full px-4 py-3 rounded-lg" placeholder="••••••••">
            </div>

            <button type="submit" class="bg-gradient w-full text-white font-semibold py-3 rounded-lg mt-4">
                Sign Up
            </button>
        </form>

        <p class="mt-6 text-center text-gray-400">
            Already have an account? <a href="{% url 'login' %}" class="text-purple-400 hover:text-purple-300">Sign in</a>
        </p>
    </div>
</body>
</html>
